<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3DGS PLY Editor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #1a1a2e; color: #e0e0e0;
  display: flex; flex-direction: column;
}
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px; background: #16213e; border-bottom: 1px solid #2a3a5c;
}
.header h1 { font-size: 1.1rem; color: #a0c4ff; }
.header-buttons { display: flex; gap: 8px; }
.toolbar {
  display: flex; align-items: center; gap: 4px;
  padding: 6px 16px; background: #0f1a30; border-bottom: 1px solid #2a3a5c;
  flex-wrap: wrap;
}
.toolbar-group {
  display: flex; gap: 2px; padding: 0 8px;
  border-right: 1px solid #2a3a5c;
}
.toolbar-group:last-child { border-right: none; }
.main {
  flex: 1; display: grid;
  grid-template-columns: 1fr 320px;
  overflow: hidden;
}
.viewport {
  position: relative; overflow: hidden; background: #0d1117;
}
#canvas3d { display: block; }
#overlayCanvas { position: absolute; top: 0; left: 0; pointer-events: none; }
.settings {
  background: #16213e; border-left: 1px solid #2a3a5c;
  padding: 16px; overflow-y: auto;
}
.settings h3 {
  font-size: 0.85rem; color: #7ec8e3;
  margin-bottom: 8px; margin-top: 16px;
  border-bottom: 1px solid #2a3a5c; padding-bottom: 4px;
}
.settings h3:first-child { margin-top: 0; }
.setting-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
}
.setting-row label { font-size: 0.8rem; color: #8899aa; min-width: 80px; }
.setting-row input[type="range"] { flex: 1; accent-color: #7ec8e3; }
.setting-row .val {
  font-size: 0.8rem; color: #a0c4ff; min-width: 40px; text-align: right;
}
.info-row {
  display: flex; justify-content: space-between;
  font-size: 0.8rem; color: #8899aa; margin-bottom: 4px;
}
.info-val { color: #e0e0e0; }
.statusbar {
  padding: 4px 16px; background: #16213e;
  border-top: 1px solid #2a3a5c; font-size: 0.8rem; color: #8899aa;
}
.btn {
  padding: 6px 12px; border: 1px solid #2a3a5c; border-radius: 4px;
  background: #0f1a30; color: #e0e0e0; font-size: 0.8rem;
  cursor: pointer; white-space: nowrap;
}
.btn:hover { background: #1a2a4c; }
.btn.active { background: #4361ee; border-color: #4361ee; color: white; }
.btn.danger { border-color: #5c2a2a; color: #ff9999; }
.btn.danger:hover { background: #3a1a1a; }
.btn.primary { background: #2a5c3a; border-color: #2a5c3a; color: #99ff99; }
.btn.primary:hover { background: #3a6c4a; }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.drop-overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(67, 97, 238, 0.2); border: 3px dashed #4361ee;
  display: none; align-items: center; justify-content: center; z-index: 10;
}
.drop-overlay.visible { display: flex; }
.drop-overlay p { font-size: 1.2rem; color: #a0c4ff; }
.placeholder {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  text-align: center; color: #445; pointer-events: none;
}
.placeholder p { font-size: 0.95rem; margin-bottom: 4px; }
.layer-item {
  display: flex; align-items: center; gap: 4px; padding: 3px 6px;
  border-radius: 3px; cursor: pointer; font-size: 0.78rem;
  border: 1px solid transparent; margin-bottom: 2px;
}
.layer-item:hover { background: #1a2a4c; }
.layer-item.active { background: #2a3a6c; border-color: #4361ee; }
.layer-item .layer-vis {
  width: 18px; height: 18px; cursor: pointer; text-align: center;
  line-height: 18px; font-size: 0.7rem; border-radius: 3px;
  background: #0f1a30; border: 1px solid #2a3a5c; flex-shrink: 0;
}
.layer-item .layer-vis.hidden { opacity: 0.3; }
.layer-item .layer-lock {
  width: 18px; height: 18px; cursor: pointer; text-align: center;
  line-height: 18px; font-size: 0.7rem; border-radius: 3px;
  background: #0f1a30; border: 1px solid #2a3a5c; flex-shrink: 0;
}
.layer-item .layer-lock.locked { opacity: 1; color: #ff4444; font-weight: bold; }
.layer-item .layer-order {
  display: flex; flex-direction: column; gap: 0; flex-shrink: 0; margin-left: auto;
}
.layer-item .layer-order button {
  background: none; border: none; color: #667; cursor: pointer;
  font-size: 0.6rem; line-height: 1; padding: 0 2px;
}
.layer-item .layer-order button:hover { color: #e0e0e0; }
.layer-item .layer-order button:disabled { opacity: 0.2; cursor: default; }
.layer-item .layer-sel-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  background: transparent;
}
.layer-item .layer-sel-dot.has-sel { background: #00e5ff; }
.layer-vis-bar {
  display: flex; gap: 4px; margin-bottom: 4px; align-items: center;
}
.layer-vis-bar button {
  background: #0f1a30; border: 1px solid #2a3a5c; color: #aab; cursor: pointer;
  border-radius: 3px; font-size: 0.68rem; padding: 2px 6px;
}
.layer-vis-bar button:hover { background: #1a2a4c; color: #e0e0e0; }
.layer-item .layer-name {
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.layer-item .layer-count {
  font-size: 0.7rem; color: #667; min-width: 35px; text-align: right;
}
.context-toolbar {
  position: absolute; display: none; z-index: 50;
  background: rgba(10, 15, 30, 0.92); border: 1px solid #4361ee;
  border-radius: 6px; padding: 4px; gap: 3px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  pointer-events: auto;
  flex-direction: row;
}
.context-toolbar.visible { display: flex; }
.ctx-btn {
  padding: 5px 10px; border: 1px solid #2a3a5c; border-radius: 4px;
  background: #0f1a30; color: #e0e0e0; font-size: 0.75rem;
  cursor: pointer; white-space: nowrap;
}
.ctx-btn:hover { background: #4361ee; color: white; border-color: #4361ee; }
.ctx-delete { color: #ff6b6b; border-color: #5c2a2a; }
.ctx-delete:hover { background: #cc3333; color: white; border-color: #cc3333; }
.ctx-color { color: #7ec8e3; border-color: #2a4a5c; }
.ctx-color:hover { background: #2a7a9c; color: white; border-color: #2a7a9c; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div class="header">
  <h1>3DGS PLY Editor</h1>
  <div class="header-buttons">
    <button class="btn" id="btnLoad">Load PLY</button>
    <input type="file" id="fileInput" accept=".ply,.plyproj" style="display:none">
    <button class="btn" id="btnSaveProj" disabled>Save Project</button>
    <button class="btn primary" id="btnExport" disabled>Export PLY</button>
  </div>
</div>

<div class="toolbar">
  <div class="toolbar-group">
    <button class="btn active" id="toolNavigate" title="Navigate (V)">Navigate</button>
    <button class="btn" id="toolBrush" title="Brush (B)">Brush</button>
    <button class="btn" id="toolRect" title="Rectangle (R)">Rect</button>
    <button class="btn" id="toolWarp" title="Warp (W)">Warp</button>
    <button class="btn" id="toolDensifyBrush" title="Densify Brush (D)">Densify</button>
    <button class="btn" id="toolMove" title="Move (G)">Move</button>
    <button class="btn" id="toolScale" title="Scale (S)">Scale</button>
    <button class="btn" id="toolRotate" title="Rotate (T)">Rotate</button>
    <button class="btn" id="toolBend" title="Bend (N)">Bend</button>
  </div>
  <div class="toolbar-group">
    <button class="btn danger" id="btnDelete" title="Delete (Del)" disabled>Delete</button>
    <button class="btn" id="btnDensify" title="Densify" disabled>Densify</button>
    <button class="btn" id="btnThin" title="Thin (decimate dense points)" disabled>Thin</button>
    <button class="btn primary" id="btnDensifyApply" style="display:none">Apply</button>
    <button class="btn danger" id="btnDensifyCancel" style="display:none">Cancel</button>
  </div>
  <div class="toolbar-group">
    <button class="btn" id="btnInvert" title="Invert (Ctrl+I)" disabled>Invert</button>
    <button class="btn" id="btnSelectAll" title="Select All (Ctrl+A)" disabled>Select All</button>
    <button class="btn" id="btnClearSel" title="Clear Selection" disabled>Clear</button>
  </div>
  <div class="toolbar-group">
    <button class="btn" id="btnMask" title="Mask Selection (M)" disabled>Mask</button>
    <button class="btn" id="btnUnmask" title="Unmask All (U)" disabled>Unmask</button>
  </div>
  <div class="toolbar-group">
    <button class="btn" id="btnUndo" title="Undo (Ctrl+Z)" disabled>Undo</button>
    <button class="btn" id="btnRedo" title="Redo (Ctrl+Shift+Z)" disabled>Redo</button>
  </div>
</div>

<div class="main">
  <div class="viewport" id="viewport">
    <canvas id="canvas3d"></canvas>
    <canvas id="overlayCanvas"></canvas>
    <div class="drop-overlay" id="dropOverlay"><p id="dropOverlayText">Drop PLY file here</p></div>
    <div class="context-toolbar" id="contextToolbar">
      <button class="ctx-btn" id="ctxMove" title="Move (G)">Move</button>
      <button class="ctx-btn" id="ctxScale" title="Scale (S)">Scale</button>
      <button class="ctx-btn" id="ctxRotate" title="Rotate (T)">Rotate</button>
      <button class="ctx-btn ctx-delete" id="ctxDelete" title="Delete (Del)">Delete</button>
      <button class="ctx-btn ctx-color" id="ctxAdjustColor" title="Apply color adjustment">Adjust</button>
    </div>
    <div class="placeholder" id="placeholder">
      <p>Drop a 3DGS PLY file here</p>
      <p>or click "Load PLY"</p>
    </div>
  </div>
  <div class="settings">
    <h3>Display</h3>
    <div class="setting-row">
      <label>Background</label>
      <input type="color" id="bgColor" value="#b4b4b4" style="width:40px; height:24px; border:1px solid #2a3a5c; border-radius:3px; background:none; cursor:pointer; padding:0;">
    </div>
    <div class="setting-row">
      <label>Point Size</label>
      <input type="range" id="pointSize" min="1" max="10" step="0.5" value="2">
      <span class="val" id="pointSizeVal">2</span>
    </div>
    <div class="setting-row">
      <label style="min-width:auto"><input type="checkbox" id="useScale" style="accent-color:#7ec8e3; vertical-align:middle; margin-right:4px">Scale反映</label>
    </div>
    <div class="setting-row">
      <label>Opacity Cut</label>
      <input type="range" id="opacityCut" min="0" max="1" step="0.01" value="0.1">
      <span class="val" id="opacityCutVal">0.10</span>
    </div>
    <h3>Brush</h3>
    <div class="setting-row">
      <label>Size</label>
      <input type="range" id="brushSize" min="10" max="200" step="5" value="50">
      <span class="val" id="brushSizeVal">50</span>
    </div>
    <div class="setting-row">
      <label style="min-width:auto"><input type="checkbox" id="sparseMode" style="accent-color:#7ec8e3; vertical-align:middle; margin-right:4px">Sparse</label>
      <input type="range" id="densityThreshold" min="1" max="100" step="1" value="20" disabled>
      <span class="val" id="densityThresholdVal">20</span>
    </div>
    <h3>Densify</h3>
    <div class="setting-row">
      <label>Count</label>
      <input type="range" id="densifyCount" min="1" max="10" step="1" value="1">
      <span class="val" id="densifyCountVal">1x</span>
    </div>
    <div class="setting-row">
      <label>Jitter</label>
      <input type="range" id="densifyJitter" min="0" max="0.5" step="0.01" value="0.2">
      <span class="val" id="densifyJitterVal">0.20</span>
    </div>
    <h3>Thin</h3>
    <div class="setting-row">
      <label>Spacing</label>
      <input type="range" id="thinSpacing" min="0.001" max="0.1" step="0.001" value="0.01">
      <span class="val" id="thinSpacingVal">0.010</span>
    </div>
    <h3>Warp</h3>
    <div class="setting-row">
      <label>Strength</label>
      <input type="range" id="warpStrength" min="0.1" max="5" step="0.1" value="0.5">
      <span class="val" id="warpStrengthVal">0.5</span>
    </div>
    <h3>Bend</h3>
    <div class="setting-row">
      <label>Source</label>
      <select id="bendSourceAxis" style="flex:1; background:#0f1a30; color:#e0e0e0; border:1px solid #2a3a5c; border-radius:3px; padding:2px 4px; font-size:0.8rem;">
        <option value="x">X</option>
        <option value="y">Y</option>
        <option value="z" selected>Z</option>
      </select>
      <label style="min-width:auto; margin-left:4px;">Displace</label>
      <select id="bendDisplaceAxis" style="flex:1; background:#0f1a30; color:#e0e0e0; border:1px solid #2a3a5c; border-radius:3px; padding:2px 4px; font-size:0.8rem;">
        <option value="x">X</option>
        <option value="y" selected>Y</option>
        <option value="z">Z</option>
      </select>
    </div>
    <div class="setting-row">
      <label>Strength</label>
      <input type="range" id="bendStrength" min="0.01" max="5" step="0.01" value="1">
      <span class="val" id="bendStrengthVal">1.00</span>
    </div>
    <canvas id="bendCurveCanvas" width="280" height="160" style="width:100%; height:140px; background:#0d1117; border:1px solid #2a3a5c; border-radius:4px; cursor:crosshair; margin-bottom:4px;"></canvas>
    <div class="setting-row">
      <button class="btn primary" id="btnBendApply" style="flex:1" disabled>Apply</button>
      <button class="btn danger" id="btnBendCancel" style="flex:1" disabled>Cancel</button>
      <button class="btn" id="btnBendReset" style="flex:0 0 auto; padding:4px 8px; font-size:0.75rem;">Reset</button>
    </div>
    <h3>Scale</h3>
    <div class="setting-row">
      <label>Falloff</label>
      <input type="range" id="scaleFalloff" min="0" max="5" step="0.1" value="0">
      <span class="val" id="scaleFalloffVal">0 (uniform)</span>
    </div>
    <h3>Color Adjust</h3>
    <div class="setting-row">
      <label>Hue</label>
      <input type="range" id="colorHue" min="-180" max="180" step="1" value="0">
      <span class="val" id="colorHueVal">0°</span>
    </div>
    <div class="setting-row">
      <label>Saturation</label>
      <input type="range" id="colorSat" min="-100" max="100" step="1" value="0">
      <span class="val" id="colorSatVal">0%</span>
    </div>
    <div class="setting-row">
      <label>Brightness</label>
      <input type="range" id="colorBri" min="-100" max="100" step="1" value="0">
      <span class="val" id="colorBriVal">0%</span>
    </div>
    <div class="setting-row">
      <button class="btn" id="btnApplyColor" disabled style="flex:1">Apply</button>
      <button class="btn" id="btnResetColorSliders" style="flex:0 0 auto; padding:4px 8px; font-size:0.75rem;">Reset</button>
    </div>
    <h3>Select by Color</h3>
    <div class="setting-row">
      <label>Color</label>
      <input type="color" id="selColor" value="#000000" style="width:40px; height:24px; border:1px solid #2a3a5c; border-radius:3px; background:none; cursor:pointer; padding:0;">
      <button class="btn" id="btnPickColor" title="Pick color from point (P)" style="padding:4px 8px; font-size:0.75rem;">Pick</button>
    </div>
    <div class="setting-row">
      <label>Threshold</label>
      <input type="range" id="selColorThreshold" min="0.01" max="0.5" step="0.01" value="0.1">
      <span class="val" id="selColorThresholdVal">0.1</span>
    </div>
    <div class="setting-row">
      <button class="btn" id="btnSelectByColor" disabled style="flex:1">Select by Color</button>
      <button class="btn" id="btnAddByColor" disabled style="flex:1">Add to Sel</button>
    </div>
    <div class="setting-row">
      <button class="btn" id="btnSelectSimilar" disabled style="flex:1" title="選択ポイントと同系色を全体から選択">Select Similar</button>
      <button class="btn" id="btnAddSimilar" disabled style="flex:1" title="選択ポイントと同系色を選択に追加">Add Similar</button>
    </div>
    <h3>Layers</h3>
    <div id="layerPanel" style="margin-bottom:8px;">
      <div class="layer-vis-bar">
        <button id="btnLayerToggleAll">All Show</button>
      </div>
      <div id="layerList"></div>
      <div style="display:flex; gap:4px; margin-top:6px;">
        <button class="btn" id="btnLayerAdd" style="flex:1; padding:4px 6px; font-size:0.75rem;" disabled>+ Add</button>
        <button class="btn" id="btnLayerMovesel" style="flex:1; padding:4px 6px; font-size:0.75rem;" disabled>Move Sel →</button>
        <button class="btn danger" id="btnLayerDel" style="flex:1; padding:4px 6px; font-size:0.75rem;" disabled>Delete</button>
        <button class="btn" id="btnLayerMerge" style="flex:1; padding:4px 6px; font-size:0.75rem;" disabled>Merge ↓</button>
      </div>
    </div>
    <h3>Info</h3>
    <div class="info-row"><span>Total</span><span class="info-val" id="infoTotal">-</span></div>
    <div class="info-row"><span>Selected</span><span class="info-val" id="infoSelected">0</span></div>
    <div class="info-row"><span>Masked</span><span class="info-val" id="infoMasked">0</span></div>
    <div class="info-row"><span>Original</span><span class="info-val" id="infoOriginal">-</span></div>
  </div>
</div>

<div class="statusbar" id="statusbar">Ready</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const $ = id => document.getElementById(id);
const C0 = 0.28209479177387814;

// ===== State =====
const state = {
  rawBuffer: null,    // vertex binary data (after header)
  headerStr: '',
  properties: [],
  vertexSize: 0,
  offsets: {},        // { propName: byteOffset }
  dataView: null,
  originalCount: 0,

  vertices: [],       // [{srcIndex}|{data: Uint8Array}]
  selected: new Set(),
  rawSelected: new Set(),  // brush/rect region before density filter
  masked: new Set(),

  baseColors: null,   // Float32Array(n*3)
  baseOpacities: null, // Float32Array(n) — sigmoid-decoded opacity per vertex
  positions: null,    // Float32Array(n*3)
  density: null,      // Uint32Array(n) — neighbor count per vertex
  cellSize: 0.01,     // grid cell size from density computation
  pointCloud: null,

  undoStack: [],
  redoStack: [],

  layers: [],         // [{id, name, visible, vertexIndices: Set}]
  activeLayerId: 0,
  nextLayerId: 1,

  currentTool: 'navigate',
  fileName: '',

  // Clipboard
  clipboard: [],  // [{data: Uint8Array}] — copied vertex data

  // Densify preview
  previewMode: false,
  previewSourceIndices: [],  // selected indices at preview start
  previewSelPos: [],         // positions of selected points
  previewNeighbors: [],      // KNN result
  previewCount: 0,           // number of preview vertices appended
};

// ===== Three.js Setup =====
const canvas = $('canvas3d');
const overlay = $('overlayCanvas');
const overlayCtx = overlay.getContext('2d');
const viewport = $('viewport');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.outputColorSpace = THREE.LinearSRGBColorSpace; // SH DC colors are already sRGB

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xb4b4b4);

const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 1000);
camera.position.set(0, 2, 5);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

const grid = new THREE.GridHelper(10, 20, 0x2a3a5c, 0x1a2a4c);
scene.add(grid);

// ===== Resize & Animate =====
function resize() {
  const w = viewport.clientWidth;
  const h = viewport.clientHeight;
  renderer.setSize(w, h);
  overlay.width = w;
  overlay.height = h;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
requestAnimationFrame(resize);

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
controls.addEventListener('change', () => updateContextToolbar());

// ===== PLY Parser =====
// PLYバイナリ解析（純粋関数、stateを変更しない）
function parsePLYRaw(arrayBuffer) {
  const bytes = new Uint8Array(arrayBuffer);
  let headerEnd = 0;
  const endStr = 'end_header';
  for (let i = 0; i < Math.min(bytes.length, 50000); i++) {
    let match = true;
    for (let j = 0; j < endStr.length; j++) {
      if (bytes[i + j] !== endStr.charCodeAt(j)) { match = false; break; }
    }
    if (match) {
      headerEnd = i + endStr.length;
      while (headerEnd < bytes.length && bytes[headerEnd] !== 0x0A) headerEnd++;
      headerEnd++;
      break;
    }
  }
  if (headerEnd === 0) throw new Error('Invalid PLY: no header end found');

  const headerStr = new TextDecoder().decode(bytes.slice(0, headerEnd));
  if (!headerStr.includes('f_dc_0')) throw new Error('Not a 3DGS PLY (missing f_dc_0)');

  const lines = headerStr.split('\n');
  let vertexCount = 0;
  const properties = [];
  let inVertex = false;

  for (const line of lines) {
    const t = line.trim();
    if (t.startsWith('element vertex')) {
      vertexCount = parseInt(t.split(/\s+/)[2]);
      inVertex = true;
    } else if (t.startsWith('element')) {
      inVertex = false;
    } else if (inVertex && t.startsWith('property')) {
      const parts = t.split(/\s+/);
      properties.push({ type: parts[1], name: parts[2] });
    }
  }
  if (vertexCount === 0) throw new Error('No vertices in PLY');

  const sizeMap = { float: 4, double: 8, uchar: 1, uint8: 1, char: 1, int: 4, uint: 4, short: 2, ushort: 2 };
  let vertexSize = 0;
  const offsets = {};
  for (const prop of properties) {
    offsets[prop.name] = vertexSize;
    vertexSize += sizeMap[prop.type] || 4;
  }

  for (const r of ['x', 'y', 'z', 'f_dc_0', 'f_dc_1', 'f_dc_2']) {
    if (offsets[r] === undefined) throw new Error('Missing property: ' + r);
  }

  return {
    headerStr, properties, vertexSize, offsets, vertexCount,
    rawBuffer: arrayBuffer.slice(headerEnd),
  };
}

function parsePLY(arrayBuffer) {
  const p = parsePLYRaw(arrayBuffer);
  state.rawBuffer = p.rawBuffer;
  state.headerStr = p.headerStr;
  state.properties = p.properties;
  state.vertexSize = p.vertexSize;
  state.offsets = p.offsets;
  state.dataView = new DataView(p.rawBuffer);
  state.originalCount = p.vertexCount;

  state.vertices = [];
  for (let i = 0; i < p.vertexCount; i++) state.vertices.push({ srcIndex: i });

  state.selected.clear(); state.rawSelected.clear();
  state.masked.clear();
  state.undoStack = [];
  state.redoStack = [];

  const allIndices = new Set();
  for (let i = 0; i < p.vertexCount; i++) allIndices.add(i);
  state.layers = [{ id: 0, name: 'Layer 0', visible: true, locked: false, vertexIndices: allIndices }];
  state.activeLayerId = 0;
  state.nextLayerId = 1;

  return p.vertexCount;
}

// PLYファイルを既存データにマージ（追加読み込み）
function mergePLY(arrayBuffer, fileName) {
  const incoming = parsePLYRaw(arrayBuffer);

  // スキーマ互換性チェック
  if (incoming.properties.length !== state.properties.length) {
    throw new Error('Cannot merge: different number of properties (' +
      incoming.properties.length + ' vs ' + state.properties.length + ')');
  }
  for (let i = 0; i < incoming.properties.length; i++) {
    if (incoming.properties[i].name !== state.properties[i].name ||
        incoming.properties[i].type !== state.properties[i].type) {
      throw new Error('Cannot merge: property mismatch at "' + incoming.properties[i].name + '"');
    }
  }

  const startIdx = state.vertices.length;
  const count = incoming.vertexCount;
  const vs = incoming.vertexSize;
  const srcBuf = new Uint8Array(incoming.rawBuffer);

  // 全頂点をスタンドアロンコピーとして追加
  for (let i = 0; i < count; i++) {
    const data = new Uint8Array(vs);
    data.set(srcBuf.subarray(i * vs, (i + 1) * vs));
    state.vertices.push({ data });
  }

  // マージデータ用の新レイヤーを作成
  const layerName = fileName.replace(/\.ply$/i, '');
  addLayer(layerName);
  updateLayerIndicesAfterAdd(startIdx, count);

  state.selected.clear(); state.rawSelected.clear();
  state.undoStack = [];
  state.redoStack = [];

  rebuildGeometry();
  return count;
}

function mergeProject(data) {
  let proj, buf;
  if (data instanceof ArrayBuffer) {
    const bytes = new Uint8Array(data);
    const magic = new TextDecoder().decode(bytes.subarray(0, 8));
    if (magic === 'PLYPROJ2') {
      const metaLen = new DataView(data, 8, 4).getUint32(0, true);
      proj = JSON.parse(new TextDecoder().decode(bytes.subarray(12, 12 + metaLen)));
      buf = data.slice(12 + metaLen);
    } else {
      const text = new TextDecoder().decode(bytes);
      proj = JSON.parse(text);
      const b = atob(proj.ply);
      buf = new ArrayBuffer(b.length);
      const v = new Uint8Array(buf);
      for (let i = 0; i < b.length; i++) v[i] = b.charCodeAt(i);
    }
  } else {
    proj = JSON.parse(data);
    const b = atob(proj.ply);
    buf = new ArrayBuffer(b.length);
    const v = new Uint8Array(buf);
    for (let i = 0; i < b.length; i++) v[i] = b.charCodeAt(i);
  }
  if (!proj.layers) throw new Error('Invalid project file');

  const incoming = parsePLYRaw(buf);

  // スキーマ互換性チェック
  if (incoming.properties.length !== state.properties.length) {
    throw new Error('Cannot merge: different number of properties (' +
      incoming.properties.length + ' vs ' + state.properties.length + ')');
  }
  for (let i = 0; i < incoming.properties.length; i++) {
    if (incoming.properties[i].name !== state.properties[i].name ||
        incoming.properties[i].type !== state.properties[i].type) {
      throw new Error('Cannot merge: property mismatch at "' + incoming.properties[i].name + '"');
    }
  }

  const startIdx = state.vertices.length;
  const count = incoming.vertexCount;
  const vs = incoming.vertexSize;
  const srcBuf = new Uint8Array(incoming.rawBuffer);

  // 全頂点をスタンドアロンコピーとして追加
  for (let i = 0; i < count; i++) {
    const data = new Uint8Array(vs);
    data.set(srcBuf.subarray(i * vs, (i + 1) * vs));
    state.vertices.push({ data });
  }

  // プロジェクトのレイヤー構造をインポート（インデックスをオフセット）
  let importedLayers = 0;
  for (const l of proj.layers) {
    const id = state.nextLayerId++;
    const remapped = new Set();
    for (const idx of l.vertexIndices) {
      remapped.add(idx + startIdx);
    }
    state.layers.unshift({
      id,
      name: l.name,
      visible: l.visible,
      locked: !!l.locked,
      vertexIndices: remapped,
    });
    importedLayers++;
  }
  if (importedLayers > 0) state.activeLayerId = state.layers[0].id;

  state.selected.clear(); state.rawSelected.clear();
  state.undoStack = [];
  state.redoStack = [];

  rebuildGeometry();
  return { count, layers: importedLayers };
}

// ===== Geometry Management =====
function rebuildGeometry() {
  const n = state.vertices.length;
  const positions = new Float32Array(n * 3);
  const colors = new Float32Array(n * 3);
  const opacities = new Float32Array(n);
  const splatScales = new Float32Array(n);

  const { x: xOff, y: yOff, z: zOff, f_dc_0: dc0Off, f_dc_1: dc1Off, f_dc_2: dc2Off } = state.offsets;
  const hasOpacity = state.offsets.opacity !== undefined;
  const opOff = hasOpacity ? state.offsets.opacity : 0;
  const hasScale = state.offsets.scale_0 !== undefined;
  const s0Off = hasScale ? state.offsets.scale_0 : 0;
  const s1Off = hasScale ? state.offsets.scale_1 : 0;
  const s2Off = hasScale ? state.offsets.scale_2 : 0;
  const vs = state.vertexSize;
  const dv = state.dataView;

  for (let i = 0; i < n; i++) {
    const v = state.vertices[i];
    let x, y, z, dc0, dc1, dc2, rawOp = 10, rs0 = 0, rs1 = 0, rs2 = 0;
    if ('srcIndex' in v) {
      const base = v.srcIndex * vs;
      x = dv.getFloat32(base + xOff, true);
      y = dv.getFloat32(base + yOff, true);
      z = dv.getFloat32(base + zOff, true);
      dc0 = dv.getFloat32(base + dc0Off, true);
      dc1 = dv.getFloat32(base + dc1Off, true);
      dc2 = dv.getFloat32(base + dc2Off, true);
      if (hasOpacity) rawOp = dv.getFloat32(base + opOff, true);
      if (hasScale) {
        rs0 = dv.getFloat32(base + s0Off, true);
        rs1 = dv.getFloat32(base + s1Off, true);
        rs2 = dv.getFloat32(base + s2Off, true);
      }
    } else {
      const vdv = new DataView(v.data.buffer, v.data.byteOffset, v.data.byteLength);
      x = vdv.getFloat32(xOff, true);
      y = vdv.getFloat32(yOff, true);
      z = vdv.getFloat32(zOff, true);
      dc0 = vdv.getFloat32(dc0Off, true);
      dc1 = vdv.getFloat32(dc1Off, true);
      dc2 = vdv.getFloat32(dc2Off, true);
      if (hasOpacity) rawOp = vdv.getFloat32(opOff, true);
      if (hasScale) {
        rs0 = vdv.getFloat32(s0Off, true);
        rs1 = vdv.getFloat32(s1Off, true);
        rs2 = vdv.getFloat32(s2Off, true);
      }
    }
    // sigmoid decode: actual opacity = 1 / (1 + exp(-raw))
    const alpha = 1.0 / (1.0 + Math.exp(-rawOp));
    opacities[i] = alpha;
    // scale: stored as log-scale, average of 3 axes
    splatScales[i] = hasScale ? (Math.exp(rs0) + Math.exp(rs1) + Math.exp(rs2)) / 3.0 : 1.0;

    const j = i * 3;
    positions[j] = x; positions[j + 1] = y; positions[j + 2] = z;
    colors[j]     = Math.max(0, Math.min(1, 0.5 + C0 * dc0));
    colors[j + 1] = Math.max(0, Math.min(1, 0.5 + C0 * dc1));
    colors[j + 2] = Math.max(0, Math.min(1, 0.5 + C0 * dc2));
  }

  // スケールを正規化（中央値が1.0になるように）
  const sortedScales = Float32Array.from(splatScales).sort();
  const medianScale = sortedScales[Math.floor(n * 0.5)] || 1.0;
  for (let i = 0; i < n; i++) {
    splatScales[i] = Math.max(0.1, Math.min(10.0, splatScales[i] / medianScale));
  }

  state.positions = positions;
  state.basePositions = new Float32Array(positions);
  state.baseColors = new Float32Array(colors);
  state.baseOpacities = opacities;
  state.baseSplatScales = splatScales;

  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  geom.setAttribute('splatScale', new THREE.BufferAttribute(splatScales, 1));
  if (n > 0) geom.computeBoundingSphere();

  // 常にPointsオブジェクトを再作成（geometry差し替えによるWebGL VAOキャッシュ不整合を防止）
  if (state.pointCloud) {
    const oldMat = state.pointCloud.material;
    scene.remove(state.pointCloud);
    state.pointCloud.geometry.dispose();
    state.pointCloud = new THREE.Points(geom, oldMat);
    state.pointCloud.rotation.x = Math.PI;
    scene.add(state.pointCloud);
  } else {
    const mat = new THREE.ShaderMaterial({
      uniforms: {
        pointSize: { value: parseFloat($('pointSize').value) },
        useScale: { value: $('useScale')?.checked ? 1.0 : 0.0 },
      },
      vertexShader: `
        attribute float splatScale;
        uniform float pointSize;
        uniform float useScale;
        varying vec3 vColor;
        void main() {
          vColor = color;
          gl_PointSize = useScale > 0.5 ? pointSize * splatScale : pointSize;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        varying vec3 vColor;
        void main() {
          gl_FragColor = vec4(vColor, 1.0);
        }
      `,
      vertexColors: true,
    });
    state.pointCloud = new THREE.Points(geom, mat);
    state.pointCloud.rotation.x = Math.PI;
    scene.add(state.pointCloud);
  }

  state.selected.clear(); state.rawSelected.clear();
  computeDensity();
  updateSelectionDisplay();
  updateInfo();
  updateButtons();
}

// ===== Density Computation (3D grid) =====
function computeDensity() {
  const pos = state.basePositions || state.positions;
  const n = state.vertices.length;
  if (n === 0) { state.density = null; return; }

  // Bounding box
  let minX = Infinity, minY = Infinity, minZ = Infinity;
  let maxX = -Infinity, maxY = -Infinity, maxZ = -Infinity;
  for (let i = 0; i < n; i++) {
    const j = i * 3;
    if (pos[j] < minX) minX = pos[j];     if (pos[j] > maxX) maxX = pos[j];
    if (pos[j+1] < minY) minY = pos[j+1]; if (pos[j+1] > maxY) maxY = pos[j+1];
    if (pos[j+2] < minZ) minZ = pos[j+2]; if (pos[j+2] > maxZ) maxZ = pos[j+2];
  }

  // Cell size: aim for ~50 cells along longest axis
  const extent = Math.max(maxX - minX, maxY - minY, maxZ - minZ, 0.001);
  const cellSize = extent / 50;
  const invCell = 1 / cellSize;

  // Assign points to grid cells and count
  const cellCounts = new Map();
  const cellKeys = new Int32Array(n * 3); // store grid coords per point

  for (let i = 0; i < n; i++) {
    const j = i * 3;
    const cx = Math.floor((pos[j] - minX) * invCell);
    const cy = Math.floor((pos[j+1] - minY) * invCell);
    const cz = Math.floor((pos[j+2] - minZ) * invCell);
    cellKeys[j] = cx; cellKeys[j+1] = cy; cellKeys[j+2] = cz;
    const key = cx + ',' + cy + ',' + cz;
    cellCounts.set(key, (cellCounts.get(key) || 0) + 1);
  }

  // Density = sum of 27 neighboring cells (3x3x3)
  const density = new Uint32Array(n);
  for (let i = 0; i < n; i++) {
    const j = i * 3;
    const cx = cellKeys[j], cy = cellKeys[j+1], cz = cellKeys[j+2];
    let count = 0;
    for (let dx = -1; dx <= 1; dx++) {
      for (let dy = -1; dy <= 1; dy++) {
        for (let dz = -1; dz <= 1; dz++) {
          const k = (cx+dx) + ',' + (cy+dy) + ',' + (cz+dz);
          count += cellCounts.get(k) || 0;
        }
      }
    }
    density[i] = count;
  }

  state.density = density;
  state.cellSize = cellSize;

  // Update slider max to a useful percentile
  const sorted = Array.from(density).sort((a, b) => a - b);
  const p50 = sorted[Math.floor(n * 0.5)];
  const p95 = sorted[Math.floor(n * 0.95)];
  const sliderMax = Math.max(p95, 2);
  const slider = $('densityThreshold');
  slider.max = sliderMax;
  slider.value = Math.min(parseInt(slider.value), sliderMax) || Math.round(p50);
  $('densityThresholdVal').textContent = slider.value;

  console.log('[Density] computed for', n, 'points. min:', sorted[0], 'median:', p50, 'p95:', p95, 'max:', sorted[n-1]);
}

function cloneVertexData(idx) {
  const v = state.vertices[idx];
  if ('srcIndex' in v) {
    const start = v.srcIndex * state.vertexSize;
    return new Uint8Array(state.rawBuffer.slice(start, start + state.vertexSize));
  }
  return new Uint8Array(v.data);
}

// ===== Selection Display =====
function updateSelectionDisplay() {
  if (!state.pointCloud || !state.basePositions) return;
  const colors = state.pointCloud.geometry.attributes.color.array;
  const positions = state.pointCloud.geometry.attributes.position.array;
  const base = state.baseColors;
  const basePos = state.basePositions;
  const sel = state.selected;
  const mask = state.masked;
  const n = state.vertices.length;

  // 非表示レイヤーの頂点セットを構築
  const hiddenSet = getHiddenVertexSet();
  const opCut = parseFloat($('opacityCut').value);
  const opacities = state.baseOpacities;

  for (let i = 0; i < n; i++) {
    const j = i * 3;
    // opacity threshold: hide points below cutoff
    if (hiddenSet.has(i) || (opacities && opacities[i] < opCut)) {
      positions[j] = 1e10; positions[j + 1] = 1e10; positions[j + 2] = 1e10;
      colors[j] = 0; colors[j + 1] = 0; colors[j + 2] = 0;
    } else {
      // 位置を復元
      positions[j] = basePos[j]; positions[j + 1] = basePos[j + 1]; positions[j + 2] = basePos[j + 2];
      if (sel.has(i)) {
        if (colorPreviewActive) {
          // Color adjust preview: show adjusted colors
          const hueDeg = parseInt($('colorHue').value);
          const satPct = parseInt($('colorSat').value);
          const briPct = parseInt($('colorBri').value);
          let [h, s, l] = rgbToHsl(base[j], base[j+1], base[j+2]);
          h = h + hueDeg;
          s = Math.max(0, Math.min(1, s + satPct / 100));
          l = Math.max(0, Math.min(1, l + briPct / 100));
          const [nr, ng, nb] = hslToRgb(h, s, l);
          colors[j] = nr; colors[j + 1] = ng; colors[j + 2] = nb;
        } else {
          // 元の色に薄い水色をブレンド（元の色が見える程度）
          const blend = 0.45;
          colors[j]     = base[j]     * (1 - blend) + 0 * blend;
          colors[j + 1] = base[j + 1] * (1 - blend) + 1 * blend;
          colors[j + 2] = base[j + 2] * (1 - blend) + 1 * blend;
        }
      } else if (mask.has(i)) {
        colors[j] = base[j] * 0.25; colors[j + 1] = base[j + 1] * 0.25; colors[j + 2] = base[j + 2] * 0.25;
      } else {
        colors[j] = base[j]; colors[j + 1] = base[j + 1]; colors[j + 2] = base[j + 2];
      }
    }
  }
  state.pointCloud.geometry.attributes.position.needsUpdate = true;
  state.pointCloud.geometry.attributes.color.needsUpdate = true;
  updateSelectionBox();
  updateInfo();
  updateButtons();
  renderLayerList();
  // 選択があればツールバー表示フラグON、なければOFF
  if (state.selected.size >= 2 && selBoxBounds) _ctxToolbarVisible = true;
  else _ctxToolbarVisible = false;
  updateContextToolbar();
}

// ===== Context Toolbar (フローティングメニュー) =====
let _ctxToolbarVisible = false;
function showContextToolbar() { _ctxToolbarVisible = true; updateContextToolbar(); }
function hideContextToolbar() { _ctxToolbarVisible = false; $('contextToolbar').classList.remove('visible'); }

function updateContextToolbar() {
  const tb = $('contextToolbar');
  if (!_ctxToolbarVisible || !selBoxBounds || state.selected.size < 2) {
    tb.classList.remove('visible');
    return;
  }
  // ドラッグ中（変形・ブラシ・矩形選択）は非表示
  // 注: これらの変数はコード後方でlet宣言されるため、TDZ回避にtry-catchを使用
  try {
    if (moveActive || scaleActive || rotateActive || isDragging) {
      tb.classList.remove('visible');
      return;
    }
  } catch (e) { /* 初期化前は無視（ドラッグ中ではないので続行） */ }
  // 選択中心をスクリーン座標に投影
  const center = new THREE.Vector3(selBoxBounds.center[0], selBoxBounds.center[1], selBoxBounds.center[2]);
  state.pointCloud.localToWorld(center);
  const ndc = center.project(camera);
  if (ndc.z < 0 || ndc.z > 1) { tb.classList.remove('visible'); return; }

  const rect = viewport.getBoundingClientRect();
  let sx = (ndc.x * 0.5 + 0.5) * rect.width;
  let sy = (-ndc.y * 0.5 + 0.5) * rect.height;

  // バウンディングボックスの上端を使ってメニューを選択範囲の上に配置
  const topPt = new THREE.Vector3(selBoxBounds.center[0], selBoxBounds.max[1], selBoxBounds.center[2]);
  state.pointCloud.localToWorld(topPt);
  const topNdc = topPt.project(camera);
  const topSy = (-topNdc.y * 0.5 + 0.5) * rect.height;
  sy = Math.min(sy, topSy) - 40; // 上端の少し上

  // ビューポート内にクランプ
  const tbW = tb.offsetWidth || 150;
  sx = Math.max(0, Math.min(sx - tbW / 2, rect.width - tbW));
  sy = Math.max(0, sy);

  tb.style.left = sx + 'px';
  tb.style.top = sy + 'px';
  tb.classList.add('visible');
}

// コンテキストツールバーからのツール切り替え
// pointerdownで即座に反応し、イベント伝播を完全にブロック
$('contextToolbar').addEventListener('pointerdown', (e) => { e.stopPropagation(); e.preventDefault(); });
$('contextToolbar').addEventListener('pointerup', (e) => { e.stopPropagation(); e.preventDefault(); });
$('contextToolbar').addEventListener('click', (e) => { e.stopPropagation(); e.preventDefault(); });
function ctxSetTool(tool) {

}
$('ctxMove').addEventListener('pointerdown', (e) => { e.stopPropagation(); e.preventDefault(); ctxSetTool('move'); });
$('ctxScale').addEventListener('pointerdown', (e) => { e.stopPropagation(); e.preventDefault(); ctxSetTool('scale'); });
$('ctxRotate').addEventListener('pointerdown', (e) => { e.stopPropagation(); e.preventDefault(); ctxSetTool('rotate'); });

// ===== Layer Functions =====
function getActiveLayer() {
  return state.layers.find(l => l.id === state.activeLayerId) || state.layers[0];
}

function getHiddenVertexSet() {
  const hidden = new Set();
  for (const layer of state.layers) {
    if (!layer.visible) {
      for (const idx of layer.vertexIndices) hidden.add(idx);
    }
  }
  return hidden;
}

function getSelectableVertexSet() {
  // 可視かつロックされていない全レイヤーの頂点が選択可能
  const result = new Set();
  for (const layer of state.layers) {
    if (layer.visible && !layer.locked) {
      for (const idx of layer.vertexIndices) result.add(idx);
    }
  }
  return result;
}

function getLockedVertexSet() {
  const result = new Set();
  for (const layer of state.layers) {
    if (layer.locked) {
      for (const idx of layer.vertexIndices) result.add(idx);
    }
  }
  return result;
}

function getLayerForVertex(idx) {
  for (const layer of state.layers) {
    if (layer.vertexIndices.has(idx)) return layer;
  }
  return null;
}

function renderLayerList() {
  const list = $('layerList');
  if (!list) return;
  list.innerHTML = '';

  // トグルボタンのテキスト同期
  const allVis = state.layers.every(l => l.visible);
  const toggleBtn = $('btnLayerToggleAll');
  if (toggleBtn) toggleBtn.textContent = allVis ? 'All Hide' : 'All Show';

  // 選択頂点がどのレイヤーに属するか判定
  const layersWithSel = new Set();
  if (state.selected.size > 0) {
    for (const layer of state.layers) {
      for (const idx of state.selected) {
        if (layer.vertexIndices.has(idx)) { layersWithSel.add(layer.id); break; }
      }
    }
  }

  for (const layer of state.layers) {
    const item = document.createElement('div');
    item.className = 'layer-item' + (layer.id === state.activeLayerId ? ' active' : '');

    const vis = document.createElement('div');
    vis.className = 'layer-vis' + (layer.visible ? '' : ' hidden');
    vis.textContent = layer.visible ? '👁' : '—';
    vis.addEventListener('click', (e) => {
      e.stopPropagation();
      layer.visible = !layer.visible;
      updateSelectionDisplay();
    });

    const lock = document.createElement('div');
    lock.className = 'layer-lock' + (layer.locked ? ' locked' : '');
    lock.textContent = layer.locked ? '✕' : '';
    lock.addEventListener('click', (e) => {
      e.stopPropagation();
      layer.locked = !layer.locked;
      renderLayerList();
    });

    const name = document.createElement('div');
    name.className = 'layer-name';
    name.textContent = layer.name;
    name.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      const input = document.createElement('input');
      input.type = 'text';
      input.value = layer.name;
      input.style.cssText = 'width:100%; background:#0f1a30; color:#e0e0e0; border:1px solid #4361ee; border-radius:2px; font-size:0.78rem; padding:1px 4px;';
      name.replaceWith(input);
      input.focus();
      input.select();
      const commit = () => { layer.name = input.value || layer.name; renderLayerList(); };
      input.addEventListener('blur', commit);
      input.addEventListener('keydown', (ke) => { if (ke.key === 'Enter') input.blur(); });
    });

    const count = document.createElement('div');
    count.className = 'layer-count';
    count.textContent = layer.vertexIndices.size.toLocaleString();

    const layerIdx = state.layers.indexOf(layer);
    const orderBtns = document.createElement('div');
    orderBtns.className = 'layer-order';
    const upBtn = document.createElement('button');
    upBtn.textContent = '▲';
    upBtn.disabled = layerIdx === 0;
    upBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (layerIdx > 0) {
        [state.layers[layerIdx - 1], state.layers[layerIdx]] = [state.layers[layerIdx], state.layers[layerIdx - 1]];
        renderLayerList();
      }
    });
    const downBtn = document.createElement('button');
    downBtn.textContent = '▼';
    downBtn.disabled = layerIdx === state.layers.length - 1;
    downBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (layerIdx < state.layers.length - 1) {
        [state.layers[layerIdx], state.layers[layerIdx + 1]] = [state.layers[layerIdx + 1], state.layers[layerIdx]];
        renderLayerList();
      }
    });
    orderBtns.appendChild(upBtn);
    orderBtns.appendChild(downBtn);

    const selDot = document.createElement('div');
    selDot.className = 'layer-sel-dot' + (layersWithSel.has(layer.id) ? ' has-sel' : '');

    item.appendChild(vis);
    item.appendChild(lock);
    item.appendChild(selDot);
    item.appendChild(name);
    item.appendChild(count);
    item.appendChild(orderBtns);
    item.addEventListener('click', () => {
      state.activeLayerId = layer.id;
      renderLayerList();
    });
    list.appendChild(item);
  }
  updateLayerButtons();
}

function updateLayerButtons() {
  const hasData = state.vertices.length > 0;
  const hasSel = state.selected.size > 0;
  $('btnLayerAdd').disabled = !hasData;
  $('btnLayerMovesel').disabled = !hasSel || state.layers.length < 2;
  $('btnLayerDel').disabled = state.layers.length <= 1;
  $('btnLayerMerge').disabled = state.layers.length <= 1;
}

function addLayer(name) {
  const id = state.nextLayerId++;
  const layer = { id, name: name || `Layer ${id}`, visible: true, locked: false, vertexIndices: new Set() };
  state.layers.unshift(layer);
  state.activeLayerId = id;
  renderLayerList();
  return layer;
}

function moveSelectionToLayer(targetLayerId) {
  if (state.selected.size === 0) return;
  const target = state.layers.find(l => l.id === targetLayerId);
  if (!target) return;

  const count = state.selected.size;
  for (const idx of state.selected) {
    for (const layer of state.layers) {
      layer.vertexIndices.delete(idx);
    }
    target.vertexIndices.add(idx);
  }
  state.selected.clear();
  state.rawSelected.clear();
  updateSelectionDisplay();
  setStatus(`Moved ${count.toLocaleString()} points to "${target.name}"`);
}

function deleteLayer(layerId) {
  if (state.layers.length <= 1) return;
  const layer = state.layers.find(l => l.id === layerId);
  if (!layer) return;

  // このレイヤーの頂点を削除（単一パスfilter、O(n)）
  const toDelete = new Set(layer.vertexIndices);
  if (toDelete.size > 0) {
    state.vertices = state.vertices.filter((_, i) => !toDelete.has(i));
    // 他レイヤーのインデックスを更新
    updateLayerIndicesAfterDelete(toDelete);
  }

  // レイヤー自体を削除
  const idx = state.layers.indexOf(layer);
  state.layers.splice(idx, 1);
  if (state.activeLayerId === layerId) {
    const newIdx = Math.min(idx, state.layers.length - 1);
    state.activeLayerId = state.layers[newIdx].id;
  }

  state.selected.clear();
  state.rawSelected.clear();
  state.undoStack = [];
  state.redoStack = [];
  rebuildGeometry();
  updateSelectionDisplay();
  setStatus(`Deleted layer "${layer.name}" (${toDelete.size.toLocaleString()} points removed)`);
}

function mergeLayerDown() {
  if (state.layers.length <= 1) return;
  const activeIdx = state.layers.findIndex(l => l.id === state.activeLayerId);
  if (activeIdx < 0) return;
  // アクティブを下のレイヤーにマージ（最下段なら上にマージ）
  const targetIdx = activeIdx < state.layers.length - 1 ? activeIdx + 1 : activeIdx - 1;
  const active = state.layers[activeIdx];
  const target = state.layers[targetIdx];
  for (const vi of active.vertexIndices) target.vertexIndices.add(vi);
  state.layers.splice(activeIdx, 1);
  state.activeLayerId = target.id;
  updateSelectionDisplay();
  setStatus(`Merged "${active.name}" into "${target.name}"`);
}

// 頂点削除時にレイヤーのインデックスを更新（二分探索でO(n log k)）
function updateLayerIndicesAfterDelete(deletedIndices) {
  const sorted = [...deletedIndices].sort((a, b) => a - b);
  const k = sorted.length;
  for (const layer of state.layers) {
    const newSet = new Set();
    for (const idx of layer.vertexIndices) {
      if (deletedIndices.has(idx)) continue;
      // 二分探索: sorted内でidx未満の要素数 = シフト量
      let lo = 0, hi = k;
      while (lo < hi) {
        const mid = (lo + hi) >> 1;
        if (sorted[mid] < idx) lo = mid + 1;
        else hi = mid;
      }
      newSet.add(idx - lo);
    }
    layer.vertexIndices = newSet;
  }
}

// 頂点追加時にレイヤーのインデックスを更新（アクティブレイヤーに追加）
function updateLayerIndicesAfterAdd(startIdx, count) {
  const active = getActiveLayer();
  for (let i = 0; i < count; i++) {
    active.vertexIndices.add(startIdx + i);
  }
}

// Undo delete: 再挿入された頂点のレイヤーインデックスを復元（二分探索版）
function rebuildLayerIndicesForUndelete(entries, prevLayerMap) {
  const insertedIndices = entries.map(e => e.index).sort((a, b) => a - b);
  const k = insertedIndices.length;
  for (const layer of state.layers) {
    const newSet = new Set();
    for (const idx of layer.vertexIndices) {
      // 二分探索: insertedIndices内で (idx + shift) 以下の要素数を求める
      // shift自体がshiftに依存するので、iterativeに解く
      let lo = 0, hi = k;
      while (lo < hi) {
        const mid = (lo + hi) >> 1;
        if (insertedIndices[mid] <= idx + mid) lo = mid + 1;
        else hi = mid;
      }
      newSet.add(idx + lo);
    }
    layer.vertexIndices = newSet;
  }
  // 再挿入された頂点を元のレイヤーに追加
  if (prevLayerMap) {
    for (const entry of entries) {
      const layerId = prevLayerMap.get(entry.index);
      const layer = state.layers.find(l => l.id === layerId);
      if (layer) layer.vertexIndices.add(entry.index);
      else if (state.layers[0]) state.layers[0].vertexIndices.add(entry.index);
    }
  } else {
    const active = getActiveLayer();
    for (const entry of entries) active.vertexIndices.add(entry.index);
  }
}

// ===== Selection Bounding Box =====
let selBoxMesh = null;
let selBoxBounds = null; // {min:[x,y,z], max:[x,y,z], center:[x,y,z]}

function getSelectionBounds() {
  if (state.selected.size < 2 || !state.pointCloud) return null;
  const pos = state.positions;
  let mnX = Infinity, mnY = Infinity, mnZ = Infinity;
  let mxX = -Infinity, mxY = -Infinity, mxZ = -Infinity;
  for (const i of state.selected) {
    const j = i * 3;
    if (pos[j] < mnX) mnX = pos[j];     if (pos[j] > mxX) mxX = pos[j];
    if (pos[j+1] < mnY) mnY = pos[j+1]; if (pos[j+1] > mxY) mxY = pos[j+1];
    if (pos[j+2] < mnZ) mnZ = pos[j+2]; if (pos[j+2] > mxZ) mxZ = pos[j+2];
  }
  const sx = mxX - mnX, sy = mxY - mnY, sz = mxZ - mnZ;
  if (sx < 0.0001 && sy < 0.0001 && sz < 0.0001) return null;
  return {
    min: [mnX, mnY, mnZ], max: [mxX, mxY, mxZ],
    center: [(mnX+mxX)/2, (mnY+mxY)/2, (mnZ+mxZ)/2],
    size: [sx, sy, sz],
  };
}

function updateSelectionBox() {
  if (selBoxMesh && state.pointCloud) {
    state.pointCloud.remove(selBoxMesh);
    selBoxMesh.geometry.dispose();
    selBoxMesh.material.dispose();
    selBoxMesh = null;
  }
  removeMoveArrows();
  removeScaleHandles();
  removeRotateRings();
  selBoxBounds = getSelectionBounds();
  if (!selBoxBounds) return;

  const { size: [sx, sy, sz], center: [cx, cy, cz] } = selBoxBounds;
  const geom = new THREE.BoxGeometry(Math.max(sx, 0.001), Math.max(sy, 0.001), Math.max(sz, 0.001));
  const mat = new THREE.MeshBasicMaterial({ color: 0xffff00, wireframe: true, transparent: true, opacity: 0.5 });
  selBoxMesh = new THREE.Mesh(geom, mat);
  selBoxMesh.position.set(cx, cy, cz);
  state.pointCloud.add(selBoxMesh);

  if (state.currentTool === 'move') createMoveArrows();
  else if (state.currentTool === 'scale') createScaleHandles();
  else if (state.currentTool === 'rotate') createRotateRings();
}

// ===== Warp (Liquify) Tool =====
let warpActive = false;
let warpLastX = 0, warpLastY = 0;
let warpOrigPositions = null;  // Float32Array snapshot at stroke start
let warpModifiedIndices = null; // Set of indices modified during stroke

let warpLockedSet = null; // ワープ中にロックされた頂点をスキップするためのセット

function startWarp(e) {
  if (!state.pointCloud) return;
  warpActive = true;
  const coords = getCanvasCoords(e);
  warpLastX = coords.x;
  warpLastY = coords.y;
  cacheScreenPositions();
  warpOrigPositions = new Float32Array(state.positions);
  warpModifiedIndices = new Set();
  warpLockedSet = getLockedVertexSet();
  canvas.style.cursor = 'none';
}

function updateWarp(e) {
  if (!warpActive || !cachedScreenPos) return;
  const coords = getCanvasCoords(e);
  const dx = coords.x - warpLastX;
  const dy = coords.y - warpLastY;

  // Skip tiny movements
  if (Math.abs(dx) < 0.5 && Math.abs(dy) < 0.5) return;

  const brushR = parseInt($('brushSize').value);
  const strength = parseFloat($('warpStrength').value);
  const r2 = brushR * brushR;
  const n = state.vertices.length;
  const posArr = state.pointCloud.geometry.attributes.position.array;

  // Convert screen-space drag direction to a 3D displacement.
  // Use camera's right and up vectors, scaled by distance-dependent factor.
  const camRight = new THREE.Vector3();
  const camUp = new THREE.Vector3();
  camera.matrixWorld.extractBasis(camRight, camUp, new THREE.Vector3());

  // Apply inverse of pointCloud's rotation to get local-space directions
  const invQ = state.pointCloud.quaternion.clone().invert();
  camRight.applyQuaternion(invQ);
  camUp.applyQuaternion(invQ);

  for (let i = 0; i < n; i++) {
    if (warpLockedSet && warpLockedSet.has(i)) continue; // ロックレイヤーをスキップ
    const sx = cachedScreenPos[i * 2];
    const sy = cachedScreenPos[i * 2 + 1];
    const bx = sx - coords.x, by = sy - coords.y;
    const dist2 = bx * bx + by * by;
    if (dist2 > r2) continue;

    // Smooth falloff: (1 - (d/r)^2)^2 (like Photoshop's liquify)
    const t = dist2 / r2;
    const falloff = (1 - t) * (1 - t);

    // Scale displacement by distance from camera to point for consistent feel
    const j = i * 3;
    const wp = new THREE.Vector3(posArr[j], posArr[j + 1], posArr[j + 2]);
    state.pointCloud.localToWorld(wp);
    const distToCam = wp.distanceTo(camera.position);
    const pixelScale = distToCam * 0.001; // convert pixel movement to world units

    const moveAmount = falloff * strength * pixelScale;
    posArr[j]     += camRight.x * dx * moveAmount + camUp.x * (-dy) * moveAmount;
    posArr[j + 1] += camRight.y * dx * moveAmount + camUp.y * (-dy) * moveAmount;
    posArr[j + 2] += camRight.z * dx * moveAmount + camUp.z * (-dy) * moveAmount;

    warpModifiedIndices.add(i);
  }

  state.pointCloud.geometry.attributes.position.needsUpdate = true;
  // Update cached screen positions for affected points
  state.pointCloud.updateMatrixWorld();
  const mvp = new THREE.Matrix4();
  mvp.multiplyMatrices(camera.projectionMatrix, camera.matrixWorldInverse);
  mvp.multiply(state.pointCloud.matrixWorld);
  const el = mvp.elements;
  const w = viewport.clientWidth / 2, h = viewport.clientHeight / 2;
  for (const i of warpModifiedIndices) {
    const j = i * 3;
    const x = posArr[j], y = posArr[j + 1], z = posArr[j + 2];
    const clipW = el[3] * x + el[7] * y + el[11] * z + el[15];
    if (clipW <= 0) {
      cachedScreenPos[i * 2] = -99999;
      cachedScreenPos[i * 2 + 1] = -99999;
    } else {
      const clipX = el[0] * x + el[4] * y + el[8] * z + el[12];
      const clipY = el[1] * x + el[5] * y + el[9] * z + el[13];
      cachedScreenPos[i * 2]     = (clipX / clipW + 1) * w;
      cachedScreenPos[i * 2 + 1] = (1 - clipY / clipW) * h;
    }
  }

  warpLastX = coords.x;
  warpLastY = coords.y;
}

function commitWarp() {
  if (!warpActive) return;
  warpActive = false;
  canvas.style.cursor = 'crosshair';

  if (!warpModifiedIndices || warpModifiedIndices.size === 0) {
    warpOrigPositions = null;
    warpModifiedIndices = null;
    return;
  }

  // Commit modified positions to vertex data + undo stack
  const posArr = state.pointCloud.geometry.attributes.position.array;
  const xOff = state.offsets.x, yOff = state.offsets.y, zOff = state.offsets.z;
  const undoEntries = [];

  for (const i of warpModifiedIndices) {
    const j = i * 3;
    const nx = posArr[j], ny = posArr[j + 1], nz = posArr[j + 2];
    const ox = warpOrigPositions[j], oy = warpOrigPositions[j + 1], oz = warpOrigPositions[j + 2];
    if (Math.abs(nx - ox) < 0.0001 && Math.abs(ny - oy) < 0.0001 && Math.abs(nz - oz) < 0.0001) continue;

    const oldVertex = state.vertices[i];
    const newData = cloneVertexData(i);
    const dv = new DataView(newData.buffer, newData.byteOffset, newData.byteLength);
    dv.setFloat32(xOff, nx, true);
    dv.setFloat32(yOff, ny, true);
    dv.setFloat32(zOff, nz, true);
    const newVertex = { data: newData };
    undoEntries.push({ index: i, oldVertex, newVertex });
    state.vertices[i] = newVertex;
  }

  if (undoEntries.length > 0) {
    state.undoStack.push({ type: 'warp', entries: undoEntries, prevSelection: new Set(state.selected) });
    state.redoStack = [];
    // Update positions array to match vertex data
    state.positions = posArr;
    // Sync basePositions with warped positions
    for (const entry of undoEntries) {
      const j = entry.index * 3;
      state.basePositions[j] = posArr[j];
      state.basePositions[j + 1] = posArr[j + 1];
      state.basePositions[j + 2] = posArr[j + 2];
    }
  }

  warpOrigPositions = null;
  warpModifiedIndices = null;
  updateInfo();
  updateButtons();
  setStatus(`Warp applied (${undoEntries.length.toLocaleString()} points)`);
}

// ===== Bend (Bézier Curve Deformation) Tool =====
let bendActive = false;
let bendOrigPositions = null;
let bendControlPoints = [{ y: 0 }, { y: 0 }, { y: 0 }, { y: 0 }];
let bendDraggingPoint = -1;
let bendCurveCanvas = null;
let bendCurveCtx = null;
let bendTargetIndices = null;
let bendSourceRange = null;
let bendDisplaceIdx = 1;

function cubicBezierVal(t, p0, p1, p2, p3) {
  const mt = 1 - t;
  return mt * mt * mt * p0 + 3 * mt * mt * t * p1 + 3 * mt * t * t * p2 + t * t * t * p3;
}

function initBend() {
  if (!state.pointCloud) return;
  if (bendActive) applyBend(); // auto-apply previous
  bendOrigPositions = new Float32Array(state.basePositions || state.positions);
  bendActive = true;
  bendControlPoints = [{ y: 0 }, { y: 0 }, { y: 0 }, { y: 0 }];
  cacheBendParams();
  $('btnBendApply').disabled = false;
  $('btnBendCancel').disabled = false;
  drawBendCurve();
}

function cacheBendParams() {
  const sourceAxis = $('bendSourceAxis').value;
  const displaceAxis = $('bendDisplaceAxis').value;
  const sIdx = { x: 0, y: 1, z: 2 }[sourceAxis];
  bendDisplaceIdx = { x: 0, y: 1, z: 2 }[displaceAxis];

  // Locked vertices should not be deformed
  const locked = getLockedVertexSet();

  if (state.selected.size > 0) {
    bendTargetIndices = [...state.selected].filter(i => !locked.has(i));
  } else {
    bendTargetIndices = [];
    for (let i = 0; i < state.vertices.length; i++) {
      if (!locked.has(i)) bendTargetIndices.push(i);
    }
  }

  let minS = Infinity, maxS = -Infinity;
  for (const i of bendTargetIndices) {
    const v = bendOrigPositions[i * 3 + sIdx];
    if (v < minS) minS = v;
    if (v > maxS) maxS = v;
  }
  bendSourceRange = { min: minS, max: maxS, axisIdx: sIdx };
}

function updateBendPreview() {
  if (!bendActive || !bendOrigPositions) return;
  const strength = parseFloat($('bendStrength').value);
  const { min: minS, max: maxS, axisIdx: sIdx } = bendSourceRange;
  const dIdx = bendDisplaceIdx;
  const range = maxS - minS;
  if (range < 0.0001) return;

  const posArr = state.pointCloud.geometry.attributes.position.array;
  // Reset to original
  for (const i of bendTargetIndices) {
    const j = i * 3;
    posArr[j] = bendOrigPositions[j];
    posArr[j + 1] = bendOrigPositions[j + 1];
    posArr[j + 2] = bendOrigPositions[j + 2];
  }
  // Apply Bézier deformation
  const cy0 = bendControlPoints[0].y, cy1 = bendControlPoints[1].y;
  const cy2 = bendControlPoints[2].y, cy3 = bendControlPoints[3].y;
  for (const i of bendTargetIndices) {
    const j = i * 3;
    const t = (bendOrigPositions[j + sIdx] - minS) / range;
    const d = cubicBezierVal(t, cy0, cy1, cy2, cy3);
    posArr[j + dIdx] = bendOrigPositions[j + dIdx] + d * strength;
  }
  state.pointCloud.geometry.attributes.position.needsUpdate = true;
}

function bendHasEffect() {
  return bendControlPoints.some(p => Math.abs(p.y) > 0.001);
}

function applyBend() {
  if (!bendActive || !bendOrigPositions) return;
  if (!bendHasEffect()) { cancelBend(); return; }

  const posArr = state.pointCloud.geometry.attributes.position.array;
  const xOff = state.offsets.x, yOff = state.offsets.y, zOff = state.offsets.z;
  const undoEntries = [];

  for (const i of bendTargetIndices) {
    const j = i * 3;
    const nx = posArr[j], ny = posArr[j + 1], nz = posArr[j + 2];
    const ox = bendOrigPositions[j], oy = bendOrigPositions[j + 1], oz = bendOrigPositions[j + 2];
    if (Math.abs(nx - ox) < 0.0001 && Math.abs(ny - oy) < 0.0001 && Math.abs(nz - oz) < 0.0001) continue;

    const oldVertex = state.vertices[i];
    const newData = cloneVertexData(i);
    const dv = new DataView(newData.buffer, newData.byteOffset, newData.byteLength);
    dv.setFloat32(xOff, nx, true);
    dv.setFloat32(yOff, ny, true);
    dv.setFloat32(zOff, nz, true);
    const newVertex = { data: newData };
    undoEntries.push({ index: i, oldVertex, newVertex });
    state.vertices[i] = newVertex;
  }

  if (undoEntries.length > 0) {
    state.undoStack.push({ type: 'bend', entries: undoEntries, prevSelection: new Set(state.selected) });
    state.redoStack = [];
    state.positions = posArr;
    for (const entry of undoEntries) {
      const j = entry.index * 3;
      state.basePositions[j] = posArr[j];
      state.basePositions[j + 1] = posArr[j + 1];
      state.basePositions[j + 2] = posArr[j + 2];
    }
  }

  const cnt = undoEntries.length;
  bendActive = false;
  bendOrigPositions = null;
  bendTargetIndices = null;
  $('btnBendApply').disabled = true;
  $('btnBendCancel').disabled = true;
  updateInfo();
  updateButtons();
  setStatus(`Bend applied (${cnt.toLocaleString()} points)`);
}

function cancelBend() {
  if (!bendActive || !bendOrigPositions) return;
  // Restore original positions
  const posArr = state.pointCloud.geometry.attributes.position.array;
  for (const i of bendTargetIndices) {
    const j = i * 3;
    posArr[j] = bendOrigPositions[j];
    posArr[j + 1] = bendOrigPositions[j + 1];
    posArr[j + 2] = bendOrigPositions[j + 2];
  }
  state.pointCloud.geometry.attributes.position.needsUpdate = true;
  bendActive = false;
  bendOrigPositions = null;
  bendTargetIndices = null;
  $('btnBendApply').disabled = true;
  $('btnBendCancel').disabled = true;
  setStatus('Bend cancelled');
}

function resetBendCurve() {
  bendControlPoints = [{ y: 0 }, { y: 0 }, { y: 0 }, { y: 0 }];
  drawBendCurve();
  if (bendActive) updateBendPreview();
}

function drawBendCurve() {
  if (!bendCurveCanvas) {
    bendCurveCanvas = $('bendCurveCanvas');
    if (!bendCurveCanvas) return;
    bendCurveCtx = bendCurveCanvas.getContext('2d');
  }
  const c = bendCurveCanvas;
  const ctx = bendCurveCtx;
  const w = c.width, h = c.height;
  const mg = 14;
  const pw = w - mg * 2, ph = h - mg * 2;
  const cy = mg + ph / 2;

  ctx.clearRect(0, 0, w, h);

  // Grid
  ctx.strokeStyle = '#1a2a3c';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = mg + ph * i / 4;
    ctx.beginPath(); ctx.moveTo(mg, y); ctx.lineTo(w - mg, y); ctx.stroke();
  }
  for (let i = 0; i <= 4; i++) {
    const x = mg + pw * i / 4;
    ctx.beginPath(); ctx.moveTo(x, mg); ctx.lineTo(x, h - mg); ctx.stroke();
  }

  // Center line (zero displacement)
  ctx.strokeStyle = '#2a5a4c';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(mg, cy); ctx.lineTo(w - mg, cy); ctx.stroke();

  // Control point canvas positions (fixed X: 0, 1/3, 2/3, 1)
  const cpX = [0, 1 / 3, 2 / 3, 1].map(v => mg + v * pw);
  const cpY = bendControlPoints.map(p => cy - p.y * (ph / 2));

  // Tangent handle lines
  ctx.strokeStyle = 'rgba(255, 200, 80, 0.35)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 3]);
  ctx.beginPath(); ctx.moveTo(cpX[0], cpY[0]); ctx.lineTo(cpX[1], cpY[1]); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cpX[2], cpY[2]); ctx.lineTo(cpX[3], cpY[3]); ctx.stroke();
  ctx.setLineDash([]);

  // Bézier curve
  ctx.strokeStyle = '#4361ee';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i <= 80; i++) {
    const t = i / 80;
    const bv = cubicBezierVal(t, bendControlPoints[0].y, bendControlPoints[1].y, bendControlPoints[2].y, bendControlPoints[3].y);
    const x = mg + t * pw;
    const y = cy - bv * (ph / 2);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Control points
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.arc(cpX[i], cpY[i], 5, 0, Math.PI * 2);
    ctx.fillStyle = (i === 0 || i === 3) ? '#ff6b6b' : '#ffcc00';
    ctx.fill();
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Labels
  ctx.fillStyle = '#556';
  ctx.font = '9px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('+', 7, mg + 4);
  ctx.fillText('−', 7, h - mg + 3);
}

// Bend curve canvas interaction
{
  const bc = $('bendCurveCanvas');
  bc.addEventListener('pointerdown', (e) => {
    // Auto-activate bend if not active
    if (!bendActive && state.pointCloud) initBend();

    const rect = bc.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (bc.width / rect.width);
    const my = (e.clientY - rect.top) * (bc.height / rect.height);
    const mg = 14;
    const pw = bc.width - mg * 2, ph = bc.height - mg * 2;
    const cy = mg + ph / 2;
    const cpX = [0, 1 / 3, 2 / 3, 1].map(v => mg + v * pw);

    let bestDist = 18, bestIdx = -1;
    for (let i = 0; i < 4; i++) {
      const px = cpX[i];
      const py = cy - bendControlPoints[i].y * (ph / 2);
      const d = Math.sqrt((mx - px) ** 2 + (my - py) ** 2);
      if (d < bestDist) { bestDist = d; bestIdx = i; }
    }
    if (bestIdx >= 0) {
      bendDraggingPoint = bestIdx;
      bc.setPointerCapture(e.pointerId);
      e.preventDefault();
    }
  });
  bc.addEventListener('pointermove', (e) => {
    if (bendDraggingPoint < 0) return;
    const rect = bc.getBoundingClientRect();
    const my = (e.clientY - rect.top) * (bc.height / rect.height);
    const mg = 14;
    const ph = bc.height - mg * 2;
    const cy = mg + ph / 2;
    const ny = -(my - cy) / (ph / 2);
    bendControlPoints[bendDraggingPoint].y = Math.max(-1, Math.min(1, ny));
    drawBendCurve();
    if (bendActive) updateBendPreview();
    e.preventDefault();
  });
  bc.addEventListener('pointerup', (e) => {
    bendDraggingPoint = -1;
  });
  bc.addEventListener('lostpointercapture', () => {
    bendDraggingPoint = -1;
  });
}
